name: l3-leafspine
prefix: ""

topology:
  kinds:
    ceos:
        image: ceos:4.35.0F
        network-mode: none
    cisco_iol:
        image: arthurk99/cisco-iol-l2:17.15.01

  nodes:
    # Spine Layer BGP ASN : 65010
    # R-ID : 192.168.0.1
    spine1:
        kind: ceos
        startup-config: spine1.cfg
    # R-ID : 192.168.0.2
    spine2:
        kind: ceos
        startup-config: spine2.cfg

    # Leaf Layer BGP ASN : 65020
    # R-ID : 192.168.0.11
    leaf1:
        kind: ceos
        startup-config: leaf1.cfg
    # R-ID : 192.168.0.12
    leaf2:
        kind: ceos
        startup-config: leaf2.cfg
    # R-ID : 192.168.0.13
    leaf3:
        kind: ceos
        startup-config: leaf3.cfg
    # R-ID : 192.168.0.14
    leaf4:
        kind: ceos
        startup-config: leaf4.cfg

    # Host Rak 1 : 172.16.100.10
    host1:
        kind: cisco_iol
        type: L2

    # Host Rak 1 : 172.16.200.10
    host2:
        kind: cisco_iol
        type: L2

  links:
    # --- Uplinks Rak 1 (Leaf 1 & 2) To Spines ---
    - endpoints: ["leaf1:eth1", "spine1:eth1"]
    - endpoints: ["leaf1:eth2", "spine2:eth1"]
    - endpoints: ["leaf2:eth1", "spine1:eth2"]
    - endpoints: ["leaf2:eth2", "spine2:eth2"]
    
    # --- Uplinks Rak 2 (Leaf 3 & 4) To Spines ---
    - endpoints: ["leaf3:eth1", "spine1:eth3"]
    - endpoints: ["leaf3:eth2", "spine2:eth3"]
    - endpoints: ["leaf4:eth1", "spine1:eth4"]
    - endpoints: ["leaf4:eth2", "spine2:eth4"]


    - endpoints: ["leaf1:eth3", "leaf2:eth3"]
    - endpoints: ["leaf1:eth4", "leaf2:eth4"]


    - endpoints: ["leaf3:eth3", "leaf4:eth3"]
    - endpoints: ["leaf3:eth4", "leaf4:eth4"]

    # --- Dual-Homed Hosts LACP Po50  ---
    - endpoints: ["host1:eth1", "leaf1:eth5"]
    - endpoints: ["host1:eth2", "leaf2:eth5"]

    # --- Dual-Homed Hosts LACP Po50  ---
    - endpoints: ["host2:eth1", "leaf3:eth5"]
    - endpoints: ["host2:eth2", "leaf4:eth5"]
