name: vxlan-evpn
prefix: ""

topology:
  kinds:
    ceos:
      image: ceos:4.35.0F
      env:
        CLAB_MGMT_VRF: MGMT
    linux:
      image: ghcr.io/srl-labs/network-multitool:latest
      network-mode: none

  nodes:
    spine1:
      kind: ceos
      startup-config: spine1.cfg
    leaf11:
      kind: ceos
      startup-config: leaf11.cfg
    leaf12:
      kind: ceos
      startup-config: leaf12.cfg
    host1:
      kind: linux
      exec:
        - ip addr add 192.168.10.11/24 dev eth1
    host2:
      kind: linux
      exec:
        - ip addr add 192.168.10.12/24 dev eth1

  links:
    # Underlay Links (Leaf ke Spine)
    - endpoints: ["leaf11:eth1", "spine1:eth1"] # 10.11.1.0/24
    - endpoints: ["leaf12:eth1", "spine1:eth2"] # 10.12.1.0/24
    
    # Host Links
    - endpoints: ["leaf11:eth2", "host1:eth1"]
    - endpoints: ["leaf12:eth2", "host2:eth1"]
