name: radius-iol
prefix: ""

mgmt:
  ipv4-subnet: 172.20.20.0/24
topology:
  kinds:
    cisco_iol:
      image: arthurk99/cisco-iol:17.15.01
  nodes:
    client:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool:latest
      network-mode: none
      exec:
        - ip addr add 10.0.0.101/24 dev eth1
        - ip route add default via 10.0.0.1
    web:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool:latest 
      network-mode: none
      exec:
        - ip addr add 10.0.0.100/24 dev eth1
        - ip route add default via 10.0.0.1
  links:
    - endpoints: ["client:eth1", "web:eth1"]
